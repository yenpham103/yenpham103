name: Daily Activity Heartbeat

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  bump:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update last-active timestamp
        run: |
          mkdir -p .github
          date -u +"Last activity: %Y-%m-%d %H:%M:%S UTC" > .github/LAST_ACTIVE.md
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/LAST_ACTIVE.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: heartbeat $(date -u +%Y-%m-%d)"
            git push
          fi
